<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Market Intelligence</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b1220;
    color: #e2e8f0;
}

nav {
    padding: 15px 30px;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    font-size: 20px;
    color: #facc15;
}

.container {
    padding: 25px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

.kpi {
    font-size: 26px;
    font-weight: bold;
}

.chart {
    margin-top: 25px;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 650px;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #facc15;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<nav>🟡 Gold Market Intelligence Dashboard</nav>

<div class="container">

<div class="grid">
    <div class="card">
        <div>Latest Price</div>
        <div class="kpi" id="price">Loading...</div>
    </div>
    <div class="card">
        <div>Average Return</div>
        <div class="kpi" id="return">Loading...</div>
    </div>
    <div class="card">
        <div>Volatility</div>
        <div class="kpi" id="volatility">Loading...</div>
    </div>
</div>

<button onclick="toggleChart()">Toggle Chart</button>

<div class="chart">
    <h3>Price Chart</h3>
    <div id="chart"></div>
</div>

<div class="chart">
    <h3>Volatility</h3>
    <div id="volChart"></div>
</div>

<div class="chart">
    <h3>Market Regimes</h3>
    <div id="regimeChart"></div>
</div>

<div class="chart">
    <h3>Kaggle Notebook</h3>
    <iframe src="https://www.kaggle.com/code/jashanmalhotra/gold-under-the-microscope-volatility-trends"></iframe>
</div>

</div>

<script>

let dataset = [];
let chartMode = "candlestick";

async function loadData() {
    try {
        const url = "https://raw.githubusercontent.com/jashan1803/Gold-Price-Prediction/main/GoldUSD.csv";
        const res = await fetch(url);

        if (!res.ok) throw new Error("Failed to fetch CSV");

        const text = await res.text();

        const rows = text.split("\n").slice(1);

        dataset = rows
            .filter(r => r.trim() !== "")
            .map(r => {
                let c = r.split(",");

                let parts = c[0].split("-");
                let date = new Date(`20${parts[2]}-${parts[1]}-${parts[0]}`);

                return {
                    date: date,
                    open: +c[1],
                    high: +c[2],
                    low: +c[3],
                    close: +c[4],
                    volume: +c[5]
                };
            });

        if (dataset.length === 0) throw new Error("Empty dataset");

        calculateMetrics();
        drawCharts();

    } catch (err) {
        console.error(err);
        document.body.innerHTML = `
            <h2 style="color:red; text-align:center; margin-top:50px;">
                ❌ Error loading data. Please check CSV link or deployment.
            </h2>
        `;
    }
}

function calculateMetrics() {
    let close = dataset.map(d=>d.close);

    let returns = close.map((d,i)=> i>0 ? (d-close[i-1])/close[i-1] : 0);

    let avg = returns.reduce((a,b)=>a+b,0)/returns.length;

    let vol = Math.sqrt(
        returns.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b)/returns.length
    );

    document.getElementById("price").innerText = "$" + close.at(-1).toFixed(2);
    document.getElementById("return").innerText = (avg*100).toFixed(2)+"%";
    document.getElementById("volatility").innerText = vol.toFixed(4);
}

function drawCharts() {

    let dates = dataset.map(d=>d.date);

    if(chartMode === "candlestick") {
        Plotly.newPlot("chart", [{
            x: dates,
            open: dataset.map(d=>d.open),
            high: dataset.map(d=>d.high),
            low: dataset.map(d=>d.low),
            close: dataset.map(d=>d.close),
            type: 'candlestick'
        }]);
    } else {
        Plotly.newPlot("chart", [{
            x: dates,
            y: dataset.map(d=>d.close),
            type: 'scatter'
        }]);
    }

    let close = dataset.map(d=>d.close);
    let returns = close.map((d,i)=> i>0 ? (d-close[i-1])/close[i-1] : 0);

    Plotly.newPlot("volChart", [{
        x: dates,
        y: returns
    }]);

    let regime = returns.map(r => r > 0.02 ? 2 : r < -0.02 ? 1 : 0);

    Plotly.newPlot("regimeChart", [{
        x: dates,
        y: regime,
        mode: 'markers'
    }]);
}

function toggleChart() {
    chartMode = chartMode === "candlestick" ? "line" : "candlestick";
    drawCharts();
}

loadData();

</script>

</body>
</html>
